name: weekly-lint

on:
  schedule:
    - cron: '0 1 * * 1'   # Mondays 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: theplant/slackwiki@v1
        with:
          mode: lint
          config: slackwiki.config.yml
          # output: pull-request        # uncomment to open a PR instead of pushing to main.
                                        # Requires `pull-requests: write` in permissions and
                                        # repo setting "Allow GitHub Actions to create and
                                        # approve pull requests" enabled.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
