name: daily-ingest

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 (GitHub cron has no timezone — UTC only).
                            # Adjust to suit your workspace.
  workflow_dispatch:

permissions:
  contents: write

# Serialize all writes to this repo. If a lint is running, ingest queues; vice versa.
# Without this, parallel runs hit merge conflicts when both touch index.md / log.md /
# todos.md / people pages, and one run's work is lost on the autostash conflict.
concurrency:
  group: slackwiki-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: theplant/slackwiki@v1
        with:
          mode: ingest
          config: slackwiki.config.yml
          auto_commit: 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
